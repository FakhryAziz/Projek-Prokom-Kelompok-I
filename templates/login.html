<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPBU Info — Masuk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --fuel-red:    #1A73E8;
    --fuel-orange: #4FC3F7;
    --dark:        #0A0A1A;
    --dark2:       #0D1B2A;
    --dark3:       #1B2838;
    --light:       #E8F4FD;
    --muted:       #7A9BB5;
}
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* animated fuel drops background */
  .bg-drops {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    overflow: hidden;
  }
  .drop {
    position: absolute;
    width: 2px;
    background: linear-gradient(to bottom, transparent, var(--fuel-orange), transparent);
    animation: fall linear infinite;
    opacity: 0.15;
  }
  @keyframes fall {
    0%   { transform: translateY(-100px); opacity: 0; }
    10%  { opacity: 0.15; }
    90%  { opacity: 0.15; }
    100% { transform: translateY(110vh);  opacity: 0; }
  }

  /* diagonal accent strip */
  .accent-strip {
    position: fixed;
    top: -10%; left: -5%;
    width: 45%;
    height: 120%;
    background: linear-gradient(135deg, #E63946 0%, #F4A261 60%, transparent 100%);
    opacity: 0.06;
    transform: skewX(-8deg);
    z-index: 0;
  }

  .card {
    position: relative; z-index: 1;
    background: var(--dark2);
    border: 1px solid #2e2e2e;
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--fuel-red), var(--fuel-orange));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--light);
    letter-spacing: 2px;
  }
  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: -4px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: var(--light);
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  .flash-msg {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 20px;
    font-weight: 500;
  }
  .flash-error   { background: rgba(230,57,70,.15); color: #ff6b7a; border: 1px solid rgba(230,57,70,.3); }
  .flash-success { background: rgba(80,200,120,.15); color: #5cc87a; border: 1px solid rgba(80,200,120,.3); }
  .flash-info    { background: rgba(100,160,255,.15); color: #7ab3ff; border: 1px solid rgba(100,160,255,.3); }

  .field { margin-bottom: 20px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  input {
    width: 100%;
    background: var(--dark3);
    border: 1px solid #333;
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--light);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  input:focus { border-color: var(--fuel-orange); box-shadow: 0 0 0 3px rgba(244,162,97,.12); }
  input::placeholder { color: #444; }

  .btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--fuel-red), var(--fuel-orange));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
    margin-top: 8px;
  }
  .btn:hover  { opacity: .9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .hint {
    margin-top: 28px;
    background: var(--dark3);
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 16px;
  }
  .hint-title { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .hint-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .hint-row:last-child { margin-bottom: 0; }
  .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600;
  }
  .badge-admin { background: rgba(230,57,70,.2); color: var(--fuel-red); }
  .badge-user  { background: rgba(244,162,97,.2); color: var(--fuel-orange); }
  .hint-cred { color: #666; font-family: monospace; font-size: 12px; }
</style>
</head>
<body>

<div class="bg-drops" id="drops"></div>
<div class="accent-strip"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">⛽</div>
    <div>
      <div class="logo-text">SPBU INFO</div>
      <div class="logo-sub">Sistem Informasi BBM</div>
    </div>
  </div>

  <h1>MASUK</h1>
  <p class="subtitle">Pantau ketersediaan BBM secara real-time</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash-msg flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Masukkan username" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Masukkan password" required>
    </div>
    <button class="btn" type="submit">MASUK →</button>
  </form>

<script>
  // generate falling drops
  const container = document.getElementById('drops');
  for (let i = 0; i < 25; i++) {
    const d = document.createElement('div');
    d.className = 'drop';
    const h = Math.random() * 60 + 20;
    d.style.cssText = `
      left:${Math.random()*100}%;
      height:${h}px;
      animation-duration:${Math.random()*4+3}s;
      animation-delay:${Math.random()*6}s;
    `;
    container.appendChild(d);
  }
</script>
</body>
</html>
